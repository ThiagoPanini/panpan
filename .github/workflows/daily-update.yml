name: Daily Update & Deploy

on:
  schedule:
    # Runs at 10:00 UTC daily (= 07:00 BRT / UTC-3)
    - cron: '0 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "daily-update-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  daily-update:
    name: Collect data & deploy to Vercel (Daily)
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://thiagopanini.dev
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Step 1: collect dynamic data ──────────────────────────────────────────

      - name: Generate digest, recent repos, and commit activity
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional PAT with models:read scope — enables LLM-powered summary.
          # Create a GitHub fine-grained PAT, grant models:read, add it as
          # a repo secret named MODELS_TOKEN. Falls back to template summary.
          MODELS_TOKEN: ${{ secrets.MODELS_TOKEN }}
          GITHUB_USERNAME: ThiagoPanini
        run: node scripts/generate-digest.mjs

      - name: Generate coverage summary
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
          GITHUB_OWNER: ThiagoPanini
          INCLUDE_PRIVATE: 'false'
          # EXCLUDED_REPOS: 'repo-a,repo-b'
          # INCLUDED_REPOS: 'repo-c'
        run: node scripts/generate-coverage.mjs

      - name: Generate language expansion data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ThiagoPanini
        run: node scripts/generate-languages.mjs

      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            src/data/github-digest/latest.json \
            src/data/recent-repos.json \
            src/data/coverage-summary.json \
            src/data/language-expansion.json
          if git diff --staged --quiet; then
            echo "Data files unchanged — skipping commit."
          else
            git commit -m "chore(data): daily refresh $(date -u +%Y-%m-%d)"
            git push
          fi

      # ── Step 2: deploy to Vercel ───────────────────────────────────────────────

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
