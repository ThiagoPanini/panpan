name: AI Pulse — Daily Update

on:
  schedule:
    # Runs daily at 23:30 UTC (20:30 BRT)
    - cron: '30 23 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Override date (YYYY-MM-DD). Defaults to today.'
        required: false
        type: string
      counts_json:
        description: 'JSON object with interaction counts per tool. E.g. {"claude":28,"copilot-personal":48}'
        required: false
        type: string

permissions:
  contents: write

jobs:
  update-pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Optional: fetch GitHub Copilot usage ─────────────────────────
      # Uncomment when a Copilot usage API token is available.
      # - name: Fetch Copilot stats
      #   id: copilot
      #   env:
      #     COPILOT_TOKEN: ${{ secrets.COPILOT_TOKEN }}
      #   run: |
      #     DATE="${{ inputs.date || '' }}"
      #     node scripts/fetch-copilot-stats.mjs --date "$DATE" > /tmp/copilot.json

      - name: Ingest today's pulse (non-interactive)
        env:
          INPUT_DATE: ${{ inputs.date }}
          INPUT_COUNTS: ${{ inputs.counts_json }}
        run: |
          DATE="${INPUT_DATE:-$(date +%Y-%m-%d)}"
          if [ -n "$INPUT_COUNTS" ]; then
            node scripts/pulse-log-cli.mjs --date="$DATE" --json="$INPUT_COUNTS"
          else
            echo "No counts provided — skipping ingestion (use workflow_dispatch with counts_json)."
          fi

      - name: Validate generated JSON
        run: |
          node -e "
            const fs = require('fs');
            const latest = JSON.parse(fs.readFileSync('src/data/ai-pulse/latest.json','utf8'));
            const meta = JSON.parse(fs.readFileSync('src/data/ai-pulse/meta.json','utf8'));
            const archive = JSON.parse(fs.readFileSync('src/data/ai-pulse/archive/2026-Q2.json','utf8'));
            if (!latest.date) throw new Error('latest.json missing date');
            if (!meta.totalInteractions) throw new Error('meta.json invalid');
            if (!Array.isArray(archive)) throw new Error('archive is not an array');
            console.log('✅ JSON valid — total interactions:', meta.totalInteractions);
          "

      - name: Commit updated pulse data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/ai-pulse/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            DATE=$(node -p "require('./src/data/ai-pulse/latest.json').date")
            TOTAL=$(node -p "require('./src/data/ai-pulse/latest.json').totalInteractions")
            git commit -m "pulse: update AI usage for ${DATE} (${TOTAL} interactions)"
            git push
          fi
